name: 构建iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 匹配你本地的 Node 版本

      # 3. 安装依赖（核心修复：把 npm ci 改成 npm install）
      - name: 安装依赖
        run: npm install --legacy-peer-deps
        # 解释：npm install 对 workspaces 兼容性更好，不会强制校验 workspace 配置

      # 4. 构建前端项目
      - name: 构建前端
        run: npm run build

      # 5. 同步 Capacitor iOS 代码
      - name: 同步 Capacitor iOS
        run: npx cap sync ios

      # 6. 编译 iOS 归档文件
      - name: 编译 iOS 归档
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            clean archive CODE_SIGNING_ALLOWED=NO

      # 7. 导出 IPA 安装包
      - name: 导出 IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/IPA \
            -exportOptionsPlist ${{ github.workspace }}/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

      # 8. 上传 IPA 到 GitHub
      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: ios/App/build/IPA/
